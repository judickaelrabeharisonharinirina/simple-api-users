name: Dockerhub CI
on:
  push:
    branches: ["main"]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Recuperer code
      - name: Checkout
        uses: actions/checkout@v4
      # 2. Installer node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      # 3. Installer dependances
      - name: Install dependances
        run: npm install
